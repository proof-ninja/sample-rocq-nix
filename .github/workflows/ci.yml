name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31

      - name: Build
        run: |
          nix develop --command rocq makefile -f _RocqProject -o Makefile
          nix develop --command make -j$(nproc)
